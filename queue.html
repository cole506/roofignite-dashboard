          <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(100,116,139,0.15);"></div>
          <div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#d4a843;animation:spin 0.8s linear infinite;"></div>
        </div>
        <p class="text-dark-300 text-sm">Loading…</p>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <div id="view-queue" class="hidden fade-in"></div>
  </main>
</div>

<script src="shared.min.js?v=2" defer></script>
<script src="queue.js" defer></script>
<script>
window._onAuthReady = async function() {
  await loadAllData();
  document.getElementById('loading-state').classList.add('hidden');
  renderQueueTracker();
};
document.addEventListener('DOMContentLoaded', () => checkExistingSession());
</script>
</body>
