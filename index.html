<script>
// ═══════════════════════════════════════════════
// DATA LAYER — Google Sheets Integration
// ═══════════════════════════════════════════════
const SHEET_ID = '1W560POSt6T4QsNObZGxz2BKyCNvRIW7dubAxhIVkAy4';
const SHEETS = {
  'Pod 2 - RoofIgnite': 0,
  'Pod 1 - RoofIgnite': 295240236
};
const LEAD_SHEETS = {
  'ALL_ROOF': 1440123496,
  'ALL_CiGN': 951162408
};

const KPI_TARGETS = {
  linkCTR: 0.009,   // >= 0.90% is good
  linkCPC: 3.00,    // <= $3.00 is good
  cpm: 20.00,       // <= $20 is good
  frequency: 2.50,  // <= 2.50 is good
  surveyPct: 2.00,  // >= 2.00% is good
  osaPct: 20        // < 20% is good (lower is better for OSA)
};

let allAccounts = [];
let allCycles = [];
let allLeads = [];  // leads from ALL_ROOF + ALL_CiGN
let currentView = 'dashboard';
let currentPod = null;
let currentAccount = null;
let currentManager = null;

async function fetchSheetData(sheetName, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonStr) throw new Error('Failed to parse response');
    const data = JSON.parse(jsonStr[1]);
    return parseSheetData(data, sheetName);
  } catch (e) {
    console.error(`Error fetching ${sheetName}:`, e);
    return { accounts: [], cycles: [] };
  }
}

async function fetchLeadData(sheetName, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonStr) throw new Error('Failed to parse lead response');
    const data = JSON.parse(jsonStr[1]);
    return parseLeadData(data, sheetName);
  } catch (e) {
    console.error(`Error fetching leads ${sheetName}:`, e);
    return [];
  }
}

function parseLeadData(data, source) {
  const rows = data.table.rows;
  const leads = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row.c) continue;
    const va = row.c[0] ? (row.c[0].v || '') : '';
    const dateRaw = row.c[1] ? (row.c[1].f || row.c[1].v || '') : '';
    const subAccount = row.c[2] ? (row.c[2].v || '') : '';
    const name = row.c[3] ? (row.c[3].v || '') : '';
    const status = row.c[6] ? (row.c[6].v || '') : '';

    if (!subAccount || !dateRaw) continue;

    // Parse the date
    let dateStr = '';
    if (row.c[1] && row.c[1].v) {
      const v = row.c[1].v;
      if (typeof v === 'string' && v.match(/Date\(/)) {
        const m = v.match(/Date\((\d+),(\d+),(\d+)/);
        if (m) dateStr = `${m[1]}-${String(Number(m[2])+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      } else if (row.c[1].f) {
        dateStr = row.c[1].f;
      } else {
        dateStr = String(v);
      }
    }

    leads.push({
      source,
      va: va.trim(),
      date: dateStr,
      subAccount: subAccount.trim(),
      name: name.trim(),
      status: status.trim(),
    });
  }
  return leads;
}

function parseSheetData(data, podName) {
  const rows = data.table.rows;
  const accounts = [];
  const cycles = [];
  let currentAccountName = '';
  let currentAdAccountId = '';
  let currentSection = '';
  let currentMgr = '';

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row.c) continue;

    const cellA = row.c[0] ? (row.c[0].v || '') : '';
    const cellB = row.c[1] ? (row.c[1].v || '') : '';
    const cellC = row.c[2] ? (row.c[2].v || '') : '';

    if (!cellA && !cellB && !cellC) continue;

    // Detect section headers
    const isSection = cellA && !cellB && !cellC &&
      (cellA.includes('EXPANSION') || cellA.includes('POD 1') || cellA.includes('Tyler') ||
       cellA === 'ROOF Ignite' || cellA.includes('TAKEN OVER') || cellA.includes('ContractorsIgnite') ||
       cellA.includes('KLAUS') || cellA === 'KPI');

    if (isSection) {
      currentSection = cellA;
      continue;
    }

    // Detect account rows: has account name in A, has ad account ID in C (long number)
    const hasAdAccountId = cellC && String(cellC).replace(/\s/g,'').length > 10 && /^\d+$/.test(String(cellC).replace(/\s/g,''));

    // Check if B is a cycle label
    const cellBStr = String(cellB).trim();
    const cellBLower = cellBStr.toLowerCase();
    const isCycleLabel = cellBStr && (cellBLower.startsWith('cycle') || (cellBLower.includes('winter') && cellBLower.includes('cycle')));

    // Check if B is a paused/winter status (NOT a cycle row)
    const isPausedStatus = cellBStr && !isCycleLabel &&
      (cellBStr.toUpperCase() === 'PAUSED' || cellBStr.toUpperCase() === 'PAUSE' || cellBStr.toUpperCase() === 'WINTER');

    // Account summary row: has name in A, ad account ID in C, and B is NOT a cycle label
    if (cellA && hasAdAccountId && !isCycleLabel) {
      currentAccountName = cellA.trim();
      currentAdAccountId = String(cellC).replace(/\s/g,'').trim();

      // Get account manager from column V (index 21)
      const mgr = row.c[21] ? String(row.c[21].v || '').trim() : '';
      if (mgr) currentMgr = mgr;

      const bookedGoal = getNum(row, 5);
      const gregGoal = getNum(row, 6);
      const cplGoal = getNum(row, 11);
      const dailyBudget = getNum(row, 13);
      const monthlyBudget = getNum(row, 14);

      accounts.push({
        name: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        section: currentSection,
        manager: currentMgr || 'Unassigned',
        isPaused: isPausedStatus,
        bookedGoal, gregGoal, cplGoal, dailyBudget, monthlyBudget,
        cycles: []
      });
      continue;
    }

    // Cycle rows: B starts with "Cycle" or contains "Winter Cycle"
    if (isCycleLabel && currentAccountName) {
      // Get manager from this row if present
      const rowMgr = row.c[21] ? String(row.c[21].v || '').trim() : '';
      if (rowMgr) currentMgr = rowMgr;

      const cycleData = {
        account: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        manager: currentMgr || 'Unassigned',
        cycle: cellBStr,
        cycleStartDate: getDate(row, 3),
        cycleEndDate: getDate(row, 4),
        bookedGoal: getNum(row, 5),
        gregGoal: getNum(row, 6),
        totalLeads: getNum(row, 7),
        osaPct: getNum(row, 8),
        bookedAppts: getNum(row, 9),
        estBookedAppts: getNum(row, 10),
        cplGoal: getNum(row, 11),
        cpl: getNum(row, 12),
        dailyBudget: getNum(row, 13),
        monthlyBudget: getNum(row, 14),
        amountSpent: getNum(row, 15),
        linkCTR: getNum(row, 16),
        linkCPC: getNum(row, 17),
        cpm: getNum(row, 18),
        frequency: getNum(row, 19),
        surveyPct: getNum(row, 20),
        accountManager: rowMgr || currentMgr,
        notes: row.c[22] ? (row.c[22].v || '') : '',
        goodToBill: row.c[23] ? (row.c[23].v || '') : '',
        billed: row.c[24] ? (row.c[24].v || '') : '',
        billingNotes: row.c[25] ? (row.c[25].v || '') : '',
      };

      cycles.push(cycleData);
      const parentAcct = accounts.find(a => a.name === currentAccountName && a.adAccountId === currentAdAccountId);
      if (parentAcct) parentAcct.cycles.push(cycleData);
    }
  }

  return { accounts, cycles };
}

function getNum(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const v = row.c[idx].v;
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function getDate(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const cell = row.c[idx];
  const v = cell.v;
  if (!v) return null;

  // Try formatted value first
  if (cell.f) {
    // Google might give "1/15/2026" or "2026-01-15"
    const d = new Date(cell.f);
    if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
    return cell.f;
  }

  // Handle Date(year, month, day) format
  if (typeof v === 'string' && v.includes('Date(')) {
    const m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if (m) return `${m[1]}-${String(Number(m[2])+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }

  if (typeof v === 'string') return v;
  return String(v);
}

async function loadAllData() {
  document.getElementById('loading-state').classList.remove('hidden');

  const [podResults, leadResults] = await Promise.all([
    Promise.all([
      fetchSheetData('Pod 2 - RoofIgnite', SHEETS['Pod 2 - RoofIgnite']),
      fetchSheetData('Pod 1 - RoofIgnite', SHEETS['Pod 1 - RoofIgnite'])
    ]),
    Promise.all([
      fetchLeadData('ALL_ROOF', LEAD_SHEETS['ALL_ROOF']),
      fetchLeadData('ALL_CiGN', LEAD_SHEETS['ALL_CiGN'])
    ])
  ]);

  allAccounts = [...podResults[0].accounts, ...podResults[1].accounts];
  allCycles = [...podResults[0].cycles, ...podResults[1].cycles];
  allLeads = [...leadResults[0], ...leadResults[1]];

  // Populate account dropdown
  const sel = document.getElementById('account-select');
  sel.innerHTML = '<option value="">Search account...</option>';
  const activeAccounts = allAccounts.filter(a => !a.isPaused).sort((a,b) => a.name.localeCompare(b.name));
  const pausedAccounts = allAccounts.filter(a => a.isPaused).sort((a,b) => a.name.localeCompare(b.name));

  activeAccounts.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name + '|||' + a.adAccountId;
    opt.textContent = a.name;
    sel.appendChild(opt);
  });
  if (pausedAccounts.length) {
    const group = document.createElement('optgroup');
    group.label = '⏸ Paused';
    pausedAccounts.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.name + '|||' + a.adAccountId;
      opt.textContent = a.name;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  }

  document.getElementById('data-status').className = 'w-2 h-2 rounded-full bg-green-500';
  document.getElementById('data-status-text').textContent = `${allAccounts.length} accounts · ${allLeads.length} leads`;

  const alertCount = getAlertAccounts().length;
  const badge = document.getElementById('alert-badge');
  if (alertCount > 0) { badge.textContent = alertCount; badge.classList.remove('hidden'); }

  document.getElementById('loading-state').classList.add('hidden');
  navigate('dashboard');
}

async function refreshData() {
  document.getElementById('data-status').className = 'w-2 h-2 rounded-full bg-yellow-500 pulse';
  document.getElementById('data-status-text').textContent = 'Refreshing...';
  await loadAllData();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmt(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtDollar(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(0) + '%';
}
function fmtDate(dateStr) {
  if (!dateStr || dateStr === '—') return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Metric coloring helpers
function osaColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v < KPI_TARGETS.osaPct ? 'metric-good' : 'metric-bad';
}
function cplColor(v, goal) {
  if (v === null || v === undefined) return 'text-dark-400';
  if (!goal) return 'metric-neutral';
  return v <= goal ? 'metric-good' : 'metric-bad';
}
function ctrColor(v) {
  if (v === null || v === undefined || v === 0) return 'text-dark-400';
  return v >= KPI_TARGETS.linkCTR ? 'metric-good' : 'metric-bad';
}
function cpcColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.linkCPC ? 'metric-good' : 'metric-bad';
}
function cpmColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.cpm ? 'metric-good' : 'metric-bad';
}
function freqColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.frequency ? 'metric-good' : (v <= 3.5 ? 'metric-warn' : 'metric-bad');
}
function surveyColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v >= KPI_TARGETS.surveyPct ? 'metric-good' : 'metric-bad';
}

function getLatestCycle(accountName, adAccountId) {
  const acctCycles = allCycles.filter(c => c.account === accountName && c.adAccountId === adAccountId);
  if (!acctCycles.length) return null;
  return acctCycles[acctCycles.length - 1];
}

function getAlertAccounts() {
  const alerts = [];
  allAccounts.filter(a => !a.isPaused).forEach(acct => {
    const latest = getLatestCycle(acct.name, acct.adAccountId);
    if (!latest) return;
    const issues = [];

    if (latest.osaPct !== null && latest.osaPct >= KPI_TARGETS.osaPct && latest.totalLeads > 5) issues.push({ type: 'danger', msg: `High OSA: ${fmtPct(latest.osaPct)}` });
    if (acct.cplGoal && latest.cpl && latest.cpl > acct.cplGoal * 1.5) issues.push({ type: 'danger', msg: `CPL ${fmtDollar(latest.cpl,2)} far exceeds goal ${fmtDollar(acct.cplGoal,2)}` });
    else if (acct.cplGoal && latest.cpl && latest.cpl > acct.cplGoal * 1.15) issues.push({ type: 'warning', msg: `CPL ${fmtDollar(latest.cpl,2)} above goal ${fmtDollar(acct.cplGoal,2)}` });
    if (latest.totalLeads !== null && latest.totalLeads === 0) issues.push({ type: 'danger', msg: 'Zero leads this cycle' });
    if (latest.linkCTR !== null && latest.linkCTR > 0 && latest.linkCTR < KPI_TARGETS.linkCTR) issues.push({ type: 'warning', msg: `Low CTR: ${(latest.linkCTR * 100).toFixed(2)}%` });
    if (latest.frequency !== null && latest.frequency > 4) issues.push({ type: 'warning', msg: `High frequency: ${latest.frequency.toFixed(1)}` });

    if (issues.length) alerts.push({ account: acct, latest, issues });
  });
  return alerts.sort((a, b) => b.issues.filter(i => i.type === 'danger').length - a.issues.filter(i => i.type === 'danger').length);
}

function getAccountsByPod(podName) { return allAccounts.filter(a => a.pod === podName); }

function getAccountsByManager(mgrName) {
  return allAccounts.filter(a => {
    const m = (a.manager || '').toLowerCase();
    return m === mgrName.toLowerCase() || m.includes(mgrName.toLowerCase());
  });
}

function getLeadsForAccount(accountName, startDate, endDate) {
  return allLeads.filter(l => {
    const nameMatch = l.subAccount.toLowerCase().includes(accountName.toLowerCase()) || accountName.toLowerCase().includes(l.subAccount.toLowerCase());
    if (!nameMatch) return false;
    if (startDate && endDate && l.date) {
      return l.date >= startDate && l.date <= endDate;
    }
    return true;
  });
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(view, param) {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  currentView = view;

  switch(view) {
    case 'dashboard':
      document.getElementById('nav-dashboard').classList.add('active');
      renderDashboard();
      break;
    case 'alerts':
      document.getElementById('nav-alerts').classList.add('active');
      renderAlerts();
      break;
    case 'pod':
      currentPod = param;
      if (param === 'Pod 2 - RoofIgnite') document.getElementById('nav-pod2').classList.add('active');
      else document.getElementById('nav-pod1').classList.add('active');
      renderPodView(param);
      break;
    case 'manager':
      currentManager = param;
      const navId = 'nav-mgr-' + param.toLowerCase();
      const navEl = document.getElementById(navId);
      if (navEl) navEl.classList.add('active');
      renderManagerView(param);
      break;
    case 'account':
      renderAccountDetail(param.name, param.adAccountId);
      break;
    case 'billing':
      document.getElementById('nav-billing').classList.add('active');
      renderBilling();
      break;
  }
}

function navigateToAccount(val) {
  if (!val) return;
  const [name, adId] = val.split('|||');
  navigate('account', { name, adAccountId: adId });
}

function renderCPLDistChart() {
  const ctx = document.getElementById('chart-cpl-dist');
  if (!ctx) return;
  const active = allAccounts.filter(a => !a.isPaused);
  const data = active.map(a => {
    const l = getLatestCycle(a.name, a.adAccountId);
    return l && l.cpl > 0 ? { name: a.name, cpl: l.cpl, goal: a.cplGoal || l.cplGoal } : null;
  }).filter(Boolean).sort((a,b) => a.cpl - b.cpl).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{ label: 'CPL', data: data.map(d => d.cpl),
        backgroundColor: data.map(d => d.goal && d.cpl > d.goal ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)'), borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

function renderOSAChart() {
  const ctx = document.getElementById('chart-osa');
  if (!ctx) return;
  const active = allAccounts.filter(a => !a.isPaused);
  const data = active.map(a => {
    const l = getLatestCycle(a.name, a.adAccountId);
    return l && l.osaPct !== null ? { name: a.name, osa: l.osaPct } : null;
  }).filter(Boolean).sort((a,b) => a.osa - b.osa).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{ label: 'OSA %', data: data.map(d => d.osa),
        backgroundColor: data.map(d => d.osa < 20 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)'), borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: 'rgba(100,116,139,0.1)' } },
        y: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } } }
    }
  });
}

function renderLeadBreakdown(acct, cycles) {
  const container = document.getElementById('lead-breakdown');
  if (!container) return;

  // Find leads matching this account
  const accountLeads = allLeads.filter(l =>
    l.subAccount.toLowerCase().includes(acct.name.toLowerCase()) ||
    acct.name.toLowerCase().includes(l.subAccount.toLowerCase())
  );

  if (!accountLeads.length) {
    container.innerHTML = '';
    return;
  }

  // Build cycle tabs - show breakdown for each cycle that has matching leads
  let cycleBreakdowns = [];
  cycles.forEach((c, idx) => {
    if (!c.cycleStartDate || !c.cycleEndDate) return;
    const start = c.cycleStartDate;
    const end = c.cycleEndDate;
    const cycleLeads = accountLeads.filter(l => l.date && l.date >= start && l.date <= end);
    if (cycleLeads.length > 0 || idx === cycles.length - 1) {
      cycleBreakdowns.push({ cycle: c, leads: cycleLeads, isLatest: idx === cycles.length - 1 });
    }
  });

  // Also check for leads that don't match any cycle (use latest cycle's date range for current)
  if (!cycleBreakdowns.length && accountLeads.length > 0) {
    // Show all leads
    cycleBreakdowns.push({ cycle: { cycle: 'All Leads' }, leads: accountLeads, isLatest: true });
  }

  if (!cycleBreakdowns.length) { container.innerHTML = ''; return; }

  // Show latest cycle breakdown by default
  const latest = cycleBreakdowns[cycleBreakdowns.length - 1];
  const leads = latest.leads;

  // Group by date
  const byDate = {};
  leads.forEach(l => {
    const d = l.date || 'Unknown';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(l);
  });
  const dates = Object.keys(byDate).sort();

  // Group by week (7-day windows from cycle start)
  const weeks = { 'Week 1': [], 'Week 2': [], 'Week 3': [], 'Week 4': [], 'Week 5+': [] };
  if (latest.cycle.cycleStartDate) {
    const startMs = new Date(latest.cycle.cycleStartDate).getTime();
    leads.forEach(l => {
      if (!l.date) return;
      const dayDiff = Math.floor((new Date(l.date).getTime() - startMs) / (86400000));
      if (dayDiff < 7) weeks['Week 1'].push(l);
      else if (dayDiff < 14) weeks['Week 2'].push(l);
      else if (dayDiff < 21) weeks['Week 3'].push(l);
      else if (dayDiff < 28) weeks['Week 4'].push(l);
      else weeks['Week 5+'].push(l);
    });
  }

  // Status breakdown
  const confirmed = leads.filter(l => l.status && l.status.toLowerCase().includes('confirmed')).length;
  const cancelled = leads.filter(l => l.status && l.status.toLowerCase().includes('cancel')).length;
  const callback = leads.filter(l => l.status && (l.status.toLowerCase().includes('call back') || l.status.toLowerCase().includes('callback'))).length;

  container.innerHTML = `
    <div class="glass rounded-xl p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-white font-semibold">Lead Breakdown — ${latest.cycle.cycle}</h3>
        <div class="flex gap-2 text-xs">
          <span class="badge badge-green">${confirmed} confirmed</span>
          <span class="badge badge-red">${cancelled} cancelled</span>
          <span class="badge badge-blue">${callback} callback</span>
          <span class="badge badge-gray">${leads.length} total</span>
        </div>
      </div>

      <!-- Week Breakdown -->
      <div class="grid grid-cols-5 gap-3 mb-4">
        ${Object.entries(weeks).filter(([k,v]) => v.length > 0 || k !== 'Week 5+').slice(0,4).map(([week, wLeads]) => {
          const wConfirmed = wLeads.filter(l => l.status && l.status.toLowerCase().includes('confirmed')).length;
          return `
          <div class="bg-dark-800/50 rounded-lg p-3">
            <div class="text-dark-400 text-[10px] uppercase tracking-wider mb-1">${week}</div>
            <div class="text-white font-bold text-lg">${wLeads.length}</div>
            <div class="text-xs text-dark-400">${wConfirmed} confirmed</div>
          </div>`;
        }).join('')}
        ${weeks['Week 5+'].length > 0 ? `
        <div class="bg-dark-800/50 rounded-lg p-3">
          <div class="text-dark-400 text-[10px] uppercase tracking-wider mb-1">Week 5+</div>
          <div class="text-white font-bold text-lg">${weeks['Week 5+'].length}</div>
        </div>` : ''}
      </div>

      <!-- Day-by-Day -->
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-dark-600 text-dark-400 uppercase tracking-wider">
              <th class="text-left py-2 px-2 font-medium">Date</th>
              <th class="text-right py-2 px-2 font-medium">Leads</th>
              <th class="text-right py-2 px-2 font-medium">Confirmed</th>
              <th class="text-right py-2 px-2 font-medium">Cancelled</th>
              <th class="text-left py-2 px-2 font-medium">Names</th>
            </tr>
          </thead>
          <tbody>
            ${dates.map(d => {
              const dayLeads = byDate[d];
              const dConf = dayLeads.filter(l => l.status && l.status.toLowerCase().includes('confirmed')).length;
              const dCanc = dayLeads.filter(l => l.status && l.status.toLowerCase().includes('cancel')).length;
              const names = dayLeads.map(l => l.name).filter(Boolean).slice(0, 3).join(', ');
              return `
              <tr class="border-b border-dark-700/30">
                <td class="py-1.5 px-2 text-dark-200 whitespace-nowrap">${fmtDate(d)}</td>
                <td class="py-1.5 px-2 text-right text-white font-medium">${dayLeads.length}</td>
                <td class="py-1.5 px-2 text-right metric-good">${dConf || '—'}</td>
                <td class="py-1.5 px-2 text-right metric-bad">${dCanc || '—'}</td>
                <td class="py-1.5 px-2 text-dark-400 truncate max-w-[200px]">${names}${dayLeads.length > 3 ? '...' : ''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderAccountCPLChart(cycles, goalCPL) {
  const ctx = document.getElementById('chart-acct-cpl');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'CPL', data: cycles.map(c => c.cpl), borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#f97316' },
        ...(goalCPL ? [{ label: 'Goal', data: cycles.map(() => goalCPL), borderColor: 'rgba(148,163,184,0.4)', borderDash: [5,5], pointRadius: 0, fill: false }] : [])
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

function renderAccountLeadsChart(cycles) {
  const ctx = document.getElementById('chart-acct-leads');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Total Leads', data: cycles.map(c => c.totalLeads), backgroundColor: 'rgba(59,130,246,0.5)', borderRadius: 4 },
        { label: 'Booked', data: cycles.map(c => c.bookedAppts), backgroundColor: 'rgba(34,197,94,0.5)', borderRadius: 4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

// ═══════════════════════════════════════════════
// RENDER: BILLING TRACKER
// ═══════════════════════════════════════════════
function renderBilling() {
  const el = document.getElementById('view-billing');
  el.classList.remove('hidden');

  const billingData = [];
  allAccounts.filter(a => !a.isPaused).forEach(a => {
    const latest = getLatestCycle(a.name, a.adAccountId);
    if (!latest) return;
    billingData.push({ account: a, cycle: latest.cycle, spent: latest.amountSpent,
      goodToBill: latest.goodToBill, billed: latest.billed, billingNotes: latest.billingNotes,
      monthlyBudget: a.monthlyBudget || latest.monthlyBudget });
  });

  const readyToBill = billingData.filter(b => b.goodToBill === 'Yes' && b.billed !== 'Yes');
  const billed = billingData.filter(b => b.billed === 'Yes');
  const notReady = billingData.filter(b => b.goodToBill !== 'Yes' && b.billed !== 'Yes');
  const totalBilled = billed.reduce((s,b) => s + (b.monthlyBudget || 0), 0);
  const totalReady = readyToBill.reduce((s,b) => s + (b.monthlyBudget || 0), 0);

  el.innerHTML = `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">Billing Tracker</h1>
      <p class="text-dark-300 text-sm mt-1">Current cycle billing status</p>
    </div>
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Ready to Bill</div><div class="text-2xl font-bold text-yellow-400">${readyToBill.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalReady)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Billed</div><div class="text-2xl font-bold text-green-400">${billed.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalBilled)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Not Ready</div><div class="text-2xl font-bold text-dark-300">${notReady.length}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Total Accounts</div><div class="text-2xl font-bold text-white">${billingData.length}</div></div>
    </div>
    ${readyToBill.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-yellow-500"></span><h3 class="text-white font-semibold">Ready to Bill (${readyToBill.length})</h3></div>
      <table class="w-full text-sm"><tbody>
        ${readyToBill.map(b => `<tr class="table-row border-b border-dark-700/50"><td class="py-3 px-4 text-white font-medium">${b.account.name}</td><td class="py-3 px-4 text-dark-300">${b.cycle}</td><td class="py-3 px-4 text-right text-white">${fmtDollar(b.monthlyBudget)}</td><td class="py-3 px-4 text-dark-400">${b.billingNotes || ''}</td></tr>`).join('')}
      </tbody></table>
    </div>` : ''}
    <div class="glass rounded-xl overflow-hidden">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span><h3 class="text-white font-semibold">Already Billed (${billed.length})</h3></div>
      <table class="w-full text-sm"><tbody>
        ${billed.map(b => `<tr class="table-row border-b border-dark-700/50"><td class="py-3 px-4 text-white font-medium">${b.account.name}</td><td class="py-3 px-4 text-dark-300">${b.cycle}</td><td class="py-3 px-4 text-right text-white">${fmtDollar(b.monthlyBudget)}</td><td class="py-3 px-4"><span class="badge badge-green">Billed</span></td></tr>`).join('')}
      </tbody></table>
    </div>
  `;
}
