<script>
// ═══════════════════════════════════════════════
// DATA LAYER — Google Sheets Integration
// ═══════════════════════════════════════════════
const SHEET_ID = '1W560POSt6T4QsNObZGxz2BKyCNvRIW7dubAxhIVkAy4';
const SHEETS = {
  'Pod 2 - RoofIgnite': 0,
  'Pod 1 - RoofIgnite': 295240236
};

const KPI_TARGETS = {
  linkCTR: 0.009,
  linkCPC: 3.00,
  cpm: 20.00,
  frequency: 2.50,
  surveyPct: 2.00
};

let allAccounts = [];
let allCycles = [];
let currentView = 'dashboard';
let currentPod = null;
let currentAccount = null;

async function fetchSheetData(sheetName, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonStr) throw new Error('Failed to parse response');
    const data = JSON.parse(jsonStr[1]);
    return parseSheetData(data, sheetName);
  } catch (e) {
    console.error(`Error fetching ${sheetName}:`, e);
    return { accounts: [], cycles: [] };
  }
}

function parseSheetData(data, podName) {
  const rows = data.table.rows;
  const cols = data.table.cols;
  const accounts = [];
  const cycles = [];
  let currentAccountName = '';
  let currentAdAccountId = '';
  let currentSection = '';
  let currentManager = '';

  for (let i = 1; i < rows.length; i++) { // skip header
    const row = rows[i];
    if (!row.c) continue;

    const cellA = row.c[0] ? (row.c[0].v || '') : '';
    const cellB = row.c[1] ? (row.c[1].v || '') : '';
    const cellC = row.c[2] ? (row.c[2].v || '') : '';

    if (!cellA && !cellB && !cellC) continue;

    // Detect section headers (like "Tyler", "ROOF Ignite", "EXPANSION CLIENTS", "POD 1 KLAUS DEALERS")
    const isSection = cellA && !cellB && !cellC &&
      (cellA.includes('EXPANSION') || cellA.includes('POD 1') || cellA.includes('Tyler') ||
       cellA === 'ROOF Ignite' || cellA.includes('TAKEN OVER') || cellA.includes('ContractorsIgnite') ||
       cellA.includes('KLAUS') || cellA === 'KPI');

    if (isSection) {
      currentSection = cellA;
      if (cellA === 'Tyler') currentManager = 'Tyler';
      else if (cellA.includes('OSCAR') || cellA.includes('EXPANSION')) currentManager = 'Oscar';
      continue;
    }

    // Detect account summary rows (have account name + ad account ID, but cycle cell might be empty or say PAUSED/WINTER)
    const hasAdAccountId = cellC && String(cellC).length > 10 && /^\d+$/.test(String(cellC).replace(/\s/g,''));
    const isCycleRow = cellB && (String(cellB).toLowerCase().startsWith('cycle') || String(cellB).toLowerCase().includes('winter'));

    if (cellA && hasAdAccountId && !isCycleRow) {
      currentAccountName = cellA.trim();
      currentAdAccountId = String(cellC).trim();

      const isPaused = cellB && (String(cellB).toUpperCase() === 'PAUSED' || String(cellB).toUpperCase() === 'PAUSE' || String(cellB).toUpperCase() === 'WINTER');

      // Get goals from summary row
      const bookedGoal = getNum(row, 5);
      const gregGoal = getNum(row, 6);
      const cplGoal = getNum(row, 11);
      const dailyBudget = getNum(row, 13);
      const monthlyBudget = getNum(row, 14);

      // Try to get account manager from column V (index 21)
      const mgr = row.c[21] ? (row.c[21].v || '') : '';
      if (mgr) currentManager = mgr.trim();

      accounts.push({
        name: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        section: currentSection,
        manager: currentManager || (podName === 'Pod 2 - RoofIgnite' ? 'Tyler' : 'Oscar'),
        isPaused: isPaused,
        bookedGoal: bookedGoal,
        gregGoal: gregGoal,
        cplGoal: cplGoal,
        dailyBudget: dailyBudget,
        monthlyBudget: monthlyBudget,
        cycles: []
      });
      continue;
    }

    // Cycle rows
    if (isCycleRow && currentAccountName) {
      const cycleData = {
        account: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        manager: currentManager || (podName === 'Pod 2 - RoofIgnite' ? 'Tyler' : 'Oscar'),
        cycle: String(cellB).trim(),
        cycleStartDate: getDate(row, 3),
        cycleEndDate: getDate(row, 4),
        bookedGoal: getNum(row, 5),
        gregGoal: getNum(row, 6),
        totalLeads: getNum(row, 7),
        osaPct: getNum(row, 8),
        bookedAppts: getNum(row, 9),
        estBookedAppts: getNum(row, 10),
        cplGoal: getNum(row, 11),
        cpl: getNum(row, 12),
        dailyBudget: getNum(row, 13),
        monthlyBudget: getNum(row, 14),
        amountSpent: getNum(row, 15),
        linkCTR: getNum(row, 16),
        linkCPC: getNum(row, 17),
        cpm: getNum(row, 18),
        frequency: getNum(row, 19),
        surveyPct: getNum(row, 20),
        accountManager: row.c[21] ? (row.c[21].v || '') : '',
        notes: row.c[22] ? (row.c[22].v || '') : '',
        goodToBill: row.c[23] ? (row.c[23].v || '') : '',
        billed: row.c[24] ? (row.c[24].v || '') : '',
        billingNotes: row.c[25] ? (row.c[25].v || '') : '',
      };

      cycles.push(cycleData);

      // Attach to parent account
      const parentAcct = accounts.find(a => a.name === currentAccountName && a.adAccountId === currentAdAccountId);
      if (parentAcct) parentAcct.cycles.push(cycleData);
    }
  }

  return { accounts, cycles };
}

function getNum(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const v = row.c[idx].v;
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function getDate(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const v = row.c[idx].v;
  if (!v) return null;
  if (typeof v === 'string') return v;
  // Google Sheets date format: Date(year, month, day)
  const match = String(row.c[idx].f || v).match(/\d{4}[-/]\d{2}[-/]\d{2}/);
  if (match) return match[0];
  return row.c[idx].f || String(v);
}

async function loadAllData() {
  document.getElementById('loading-state').classList.remove('hidden');

  const results = await Promise.all([
    fetchSheetData('Pod 2 - RoofIgnite', SHEETS['Pod 2 - RoofIgnite']),
    fetchSheetData('Pod 1 - RoofIgnite', SHEETS['Pod 1 - RoofIgnite'])
  ]);

  allAccounts = [...results[0].accounts, ...results[1].accounts];
  allCycles = [...results[0].cycles, ...results[1].cycles];

  // Populate account dropdown
  const sel = document.getElementById('account-select');
  sel.innerHTML = '<option value="">Search account...</option>';
  const activeAccounts = allAccounts.filter(a => !a.isPaused).sort((a,b) => a.name.localeCompare(b.name));
  const pausedAccounts = allAccounts.filter(a => a.isPaused).sort((a,b) => a.name.localeCompare(b.name));

  activeAccounts.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name + '|||' + a.adAccountId;
    opt.textContent = a.name;
    sel.appendChild(opt);
  });
  if (pausedAccounts.length) {
    const group = document.createElement('optgroup');
    group.label = '⏸ Paused';
    pausedAccounts.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.name + '|||' + a.adAccountId;
      opt.textContent = a.name;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  }

  // Update status
  document.getElementById('data-status').className = 'w-2 h-2 rounded-full bg-green-500';
  document.getElementById('data-status-text').textContent = `${allAccounts.length} accounts loaded`;

  // Update alert badge
  const alertCount = getAlertAccounts().length;
  const badge = document.getElementById('alert-badge');
  if (alertCount > 0) {
    badge.textContent = alertCount;
    badge.classList.remove('hidden');
  }

  document.getElementById('loading-state').classList.add('hidden');
  navigate('dashboard');
}

async function refreshData() {
  document.getElementById('data-status').className = 'w-2 h-2 rounded-full bg-yellow-500 pulse';
  document.getElementById('data-status-text').textContent = 'Refreshing...';
  await loadAllData();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmt(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtDollar(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(0) + '%';
}

function getLatestCycle(accountName, adAccountId) {
  const acctCycles = allCycles.filter(c => c.account === accountName && c.adAccountId === adAccountId);
  if (!acctCycles.length) return null;
  return acctCycles[acctCycles.length - 1];
}

function getAlertAccounts() {
  const alerts = [];
  allAccounts.filter(a => !a.isPaused).forEach(acct => {
    const latest = getLatestCycle(acct.name, acct.adAccountId);
    if (!latest) return;
    const issues = [];

    if (latest.osaPct !== null && latest.osaPct === 0 && latest.totalLeads > 5) issues.push({ type: 'danger', msg: '0% booking rate with leads coming in' });
    else if (latest.osaPct !== null && latest.osaPct < 5 && latest.totalLeads > 10) issues.push({ type: 'warning', msg: `Low booking rate: ${fmtPct(latest.osaPct)}` });

    if (acct.cplGoal && latest.cpl && latest.cpl > acct.cplGoal * 1.5) issues.push({ type: 'danger', msg: `CPL ${fmtDollar(latest.cpl,2)} far exceeds goal ${fmtDollar(acct.cplGoal,2)}` });
    else if (acct.cplGoal && latest.cpl && latest.cpl > acct.cplGoal * 1.15) issues.push({ type: 'warning', msg: `CPL ${fmtDollar(latest.cpl,2)} above goal ${fmtDollar(acct.cplGoal,2)}` });

    if (latest.totalLeads !== null && latest.totalLeads === 0) issues.push({ type: 'danger', msg: 'Zero leads this cycle' });

    if (latest.linkCTR !== null && latest.linkCTR > 0 && latest.linkCTR < KPI_TARGETS.linkCTR) issues.push({ type: 'warning', msg: `Low CTR: ${(latest.linkCTR * 100).toFixed(2)}%` });

    if (latest.frequency !== null && latest.frequency > 4) issues.push({ type: 'warning', msg: `High frequency: ${latest.frequency.toFixed(1)}` });

    if (issues.length) alerts.push({ account: acct, latest, issues });
  });

  return alerts.sort((a, b) => {
    const aDanger = a.issues.filter(i => i.type === 'danger').length;
    const bDanger = b.issues.filter(i => i.type === 'danger').length;
    return bDanger - aDanger;
  });
}

function getAccountsByManager() {
  const mgrs = {};
  allAccounts.forEach(a => {
    const m = a.manager || 'Unassigned';
    if (!mgrs[m]) mgrs[m] = [];
    mgrs[m].push(a);
  });
  return mgrs;
}

function getAccountsByPod(podName) {
  return allAccounts.filter(a => a.pod === podName);
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(view, param) {
  // Hide all views
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  currentView = view;

  switch(view) {
    case 'dashboard':
      document.getElementById('nav-dashboard').classList.add('active');
      renderDashboard();
      break;
    case 'alerts':
      document.getElementById('nav-alerts').classList.add('active');
      renderAlerts();
      break;
    case 'pod':
      currentPod = param;
      if (param === 'Pod 2 - RoofIgnite') document.getElementById('nav-pod2').classList.add('active');
      else document.getElementById('nav-pod1').classList.add('active');
      renderPodView(param);
      break;
    case 'account':
      renderAccountDetail(param.name, param.adAccountId);
      break;
    case 'billing':
      document.getElementById('nav-billing').classList.add('active');
      renderBilling();
      break;
  }
}

function navigateToAccount(val) {
  if (!val) return;
  const [name, adId] = val.split('|||');
  navigate('account', { name, adAccountId: adId });
}

// RENDER: LEADERSHIP DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard() {
  const el = document.getElementById('view-dashboard');
  el.classList.remove('hidden');

  const active = allAccounts.filter(a => !a.isPaused);
  const paused = allAccounts.filter(a => a.isPaused);
  const alerts = getAlertAccounts();

  // Aggregate latest cycle data
  let totalLeads = 0, totalSpent = 0, totalBooked = 0, cplValues = [], osaValues = [];
  const pod1Accts = active.filter(a => a.pod === 'Pod 1 - RoofIgnite');
  const pod2Accts = active.filter(a => a.pod === 'Pod 2 - RoofIgnite');

  active.forEach(a => {
    const latest = getLatestCycle(a.name, a.adAccountId);
    if (!latest) return;
    if (latest.totalLeads) totalLeads += latest.totalLeads;
    if (latest.amountSpent) totalSpent += latest.amountSpent;
    if (latest.bookedAppts) totalBooked += latest.bookedAppts;
    if (latest.cpl && latest.cpl > 0) cplValues.push(latest.cpl);
    if (latest.osaPct !== null) osaValues.push(latest.osaPct);
  });

  const avgCPL = cplValues.length ? cplValues.reduce((a,b)=>a+b,0)/cplValues.length : 0;
  const avgOSA = osaValues.length ? osaValues.reduce((a,b)=>a+b,0)/osaValues.length : 0;

  // Calculate pod-level stats
  function podStats(accts) {
    let leads=0, spent=0, booked=0, cpls=[];
    accts.forEach(a => {
      const l = getLatestCycle(a.name, a.adAccountId);
      if (!l) return;
      if (l.totalLeads) leads += l.totalLeads;
      if (l.amountSpent) spent += l.amountSpent;
      if (l.bookedAppts) booked += l.bookedAppts;
      if (l.cpl && l.cpl > 0) cpls.push(l.cpl);
    });
    return { leads, spent, booked, avgCPL: cpls.length ? cpls.reduce((a,b)=>a+b,0)/cpls.length : 0, count: accts.length };
  }

  const p1Stats = podStats(pod1Accts);
  const p2Stats = podStats(pod2Accts);

  el.innerHTML = `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">Leadership Dashboard</h1>
      <p class="text-dark-300 text-sm mt-1">Real-time overview across all pods &middot; ${active.length} active accounts, ${paused.length} paused</p>
    </div>

    <!-- Top KPI Cards -->
    <div class="grid grid-cols-5 gap-4 mb-6">
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase tracking-wider mb-1">Active Accounts</div>
        <div class="text-2xl font-bold text-white">${active.length}</div>
        <div class="text-xs text-dark-300 mt-1">${paused.length} paused</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase tracking-wider mb-1">Latest Cycle Leads</div>
        <div class="text-2xl font-bold text-white">${fmt(totalLeads)}</div>
        <div class="text-xs text-dark-300 mt-1">${fmt(totalBooked)} booked</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase tracking-wider mb-1">Avg CPL</div>
        <div class="text-2xl font-bold ${avgCPL > 300 ? 'text-red-400' : 'text-white'}">${fmtDollar(avgCPL, 2)}</div>
        <div class="text-xs text-dark-300 mt-1">across active accounts</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase tracking-wider mb-1">Avg OSA Rate</div>
        <div class="text-2xl font-bold ${avgOSA < 5 ? 'text-red-400' : avgOSA < 10 ? 'text-yellow-400' : 'text-green-400'}">${fmtPct(avgOSA)}</div>
        <div class="text-xs text-dark-300 mt-1">booking rate</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card ${alerts.length > 0 ? 'glow border-red-500/30' : ''}">
        <div class="text-dark-400 text-xs uppercase tracking-wider mb-1">Alerts</div>
        <div class="text-2xl font-bold ${alerts.length > 0 ? 'text-red-400' : 'text-green-400'}">${alerts.length}</div>
        <div class="text-xs text-dark-300 mt-1">${alerts.filter(a=>a.issues.some(i=>i.type==='danger')).length} critical</div>
      </div>
    </div>

    <!-- Pod Comparison -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h3 class="text-white font-semibold">Pod 2 — Tyler</h3>
            <p class="text-dark-400 text-xs">${p2Stats.count} active accounts</p>
          </div>
          <button onclick="navigate('pod','Pod 2 - RoofIgnite')" class="text-brand-400 text-xs hover:text-brand-300">View All →</button>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div><div class="text-dark-400 text-[10px] uppercase">Leads</div><div class="text-white font-semibold">${fmt(p2Stats.leads)}</div></div>
          <div><div class="text-dark-400 text-[10px] uppercase">Booked</div><div class="text-white font-semibold">${fmt(p2Stats.booked)}</div></div>
          <div><div class="text-dark-400 text-[10px] uppercase">Avg CPL</div><div class="text-white font-semibold">${fmtDollar(p2Stats.avgCPL,2)}</div></div>
        </div>
      </div>
      <div class="glass rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h3 class="text-white font-semibold">Pod 1 — Oscar</h3>
            <p class="text-dark-400 text-xs">${p1Stats.count} active accounts</p>
          </div>
          <button onclick="navigate('pod','Pod 1 - RoofIgnite')" class="text-brand-400 text-xs hover:text-brand-300">View All →</button>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div><div class="text-dark-400 text-[10px] uppercase">Leads</div><div class="text-white font-semibold">${fmt(p1Stats.leads)}</div></div>
          <div><div class="text-dark-400 text-[10px] uppercase">Booked</div><div class="text-white font-semibold">${fmt(p1Stats.booked)}</div></div>
          <div><div class="text-dark-400 text-[10px] uppercase">Avg CPL</div><div class="text-white font-semibold">${fmtDollar(p1Stats.avgCPL,2)}</div></div>
        </div>
      </div>
    </div>

    <!-- Top Performers + Needs Attention -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500"></span> Top Performers
        </h3>
        <div class="space-y-2" id="top-performers"></div>
      </div>
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-red-500"></span> Needs Attention
        </h3>
        <div class="space-y-2" id="needs-attention"></div>
      </div>
    </div>

    <!-- CPL Distribution Chart + OSA Chart -->
    <div class="grid grid-cols-2 gap-4">
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3">CPL Distribution (Latest Cycle)</h3>
        <div class="chart-container"><canvas id="chart-cpl-dist"></canvas></div>
      </div>
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3">OSA Booking Rate by Account</h3>
        <div class="chart-container"><canvas id="chart-osa"></canvas></div>
      </div>
    </div>
  `;

  // Top performers: highest OSA accounts
  const performers = active.map(a => {
    const l = getLatestCycle(a.name, a.adAccountId);
    return { account: a, latest: l };
  }).filter(x => x.latest && x.latest.osaPct > 0 && x.latest.totalLeads > 5)
    .sort((a,b) => (b.latest.osaPct||0) - (a.latest.osaPct||0))
    .slice(0, 5);

  document.getElementById('top-performers').innerHTML = performers.map(p => `
    <div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-dark-700 cursor-pointer" onclick="navigate('account',{name:'${esc(p.account.name)}',adAccountId:'${p.account.adAccountId}'})">
      <div>
        <div class="text-white text-sm font-medium">${p.account.name}</div>

      </div>
      <div class="text-right">
        <div class="badge badge-green">${fmtPct(p.latest.osaPct)} OSA</div>
        <div class="text-dark-400 text-xs mt-1">${fmt(p.latest.totalLeads)} leads</div>
      </div>
    </div>
  `).join('');

  // Needs attention
  const attention = alerts.slice(0, 5);
  document.getElementById('needs-attention').innerHTML = attention.map(a => `
    <div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-dark-700 cursor-pointer" onclick="navigate('account',{name:'${esc(a.account.name)}',adAccountId:'${a.account.adAccountId}'})">
      <div>
        <div class="text-white text-sm font-medium">${a.account.name}</div>
        <div class="text-dark-400 text-xs">${a.issues[0].msg}</div>
      </div>
      <span class="badge ${a.issues[0].type === 'danger' ? 'badge-red' : 'badge-yellow'}">${a.issues[0].type === 'danger' ? 'Critical' : 'Warning'}</span>
    </div>
  `).join('');

  // Charts
  renderCPLDistChart();
  renderOSAChart();
}

function renderCPLDistChart() {
  const ctx = document.getElementById('chart-cpl-dist');
  if (!ctx) return;
  const active = allAccounts.filter(a => !a.isPaused);
  const data = active.map(a => {
    const l = getLatestCycle(a.name, a.adAccountId);
    return l && l.cpl > 0 ? { name: a.name, cpl: l.cpl, goal: a.cplGoal || l.cplGoal } : null;
  }).filter(Boolean).sort((a,b) => a.cpl - b.cpl).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{
        label: 'CPL',
        data: data.map(d => d.cpl),
        backgroundColor: data.map(d => d.goal && d.cpl > d.goal ? 'rgba(239,68,68,0.6)' : 'rgba(249,115,22,0.6)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } }
      }
    }
  });
}

function renderOSAChart() {
  const ctx = document.getElementById('chart-osa');
  if (!ctx) return;
  const active = allAccounts.filter(a => !a.isPaused);
  const data = active.map(a => {
    const l = getLatestCycle(a.name, a.adAccountId);
    return l && l.osaPct !== null ? { name: a.name, osa: l.osaPct } : null;
  }).filter(Boolean).sort((a,b) => b.osa - a.osa).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{
        label: 'OSA %',
        data: data.map(d => d.osa),
        backgroundColor: data.map(d => d.osa >= 10 ? 'rgba(34,197,94,0.6)' : d.osa >= 5 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: 'rgba(100,116,139,0.1)' } },
        y: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } }
      }
    }
  });
}

      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-[10px] uppercase tracking-wider">Link CTR</div>
        <div class="text-xl font-bold ${latest.linkCTR && latest.linkCTR < KPI_TARGETS.linkCTR ? 'text-red-400' : 'text-white'} mt-1">${latest.linkCTR ? (latest.linkCTR*100).toFixed(2)+'%' : '—'}</div>
        <div class="text-xs text-dark-400">Target: 0.90%+</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-[10px] uppercase tracking-wider">Frequency</div>
        <div class="text-xl font-bold ${latest.frequency && latest.frequency > 3 ? 'text-yellow-400' : 'text-white'} mt-1">${latest.frequency ? latest.frequency.toFixed(2) : '—'}</div>
        <div class="text-xs text-dark-400">Target: < 2.50</div>
      </div>
    </div>
    ` : '<div class="glass rounded-xl p-6 mb-6 text-dark-400 text-center">No cycle data available</div>'}

    <!-- Trend Charts -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3">CPL Trend</h3>
        <div class="chart-container"><canvas id="chart-acct-cpl"></canvas></div>
      </div>
      <div class="glass rounded-xl p-5">
        <h3 class="text-white font-semibold mb-3">Leads & Bookings</h3>
        <div class="chart-container"><canvas id="chart-acct-leads"></canvas></div>
      </div>
    </div>

    <!-- Full Cycle History Table -->
    <div class="glass rounded-xl overflow-hidden">
      <div class="p-4 border-b border-dark-600">
        <h3 class="text-white font-semibold">Cycle History</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-dark-600 text-dark-400 text-[10px] uppercase tracking-wider">
              <th class="text-left py-2.5 px-3 font-medium">Cycle</th>
              <th class="text-left py-2.5 px-3 font-medium">Start</th>
              <th class="text-left py-2.5 px-3 font-medium">End</th>
              <th class="text-right py-2.5 px-3 font-medium">Appt Goal</th>
              <th class="text-right py-2.5 px-3 font-medium">Leads</th>
              <th class="text-right py-2.5 px-3 font-medium">OSA %</th>
              <th class="text-right py-2.5 px-3 font-medium">Booked</th>
              <th class="text-right py-2.5 px-3 font-medium">Est. Booked</th>
              <th class="text-right py-2.5 px-3 font-medium">CPL Goal</th>
              <th class="text-right py-2.5 px-3 font-medium">CPL</th>
              <th class="text-right py-2.5 px-3 font-medium">Spent</th>
              <th class="text-right py-2.5 px-3 font-medium">CTR</th>
              <th class="text-right py-2.5 px-3 font-medium">CPC</th>
              <th class="text-right py-2.5 px-3 font-medium">CPM</th>
              <th class="text-right py-2.5 px-3 font-medium">Freq</th>
              <th class="text-right py-2.5 px-3 font-medium">Survey %</th>
              <th class="text-center py-2.5 px-3 font-medium">Billed</th>
            </tr>
          </thead>
          <tbody>
            ${cycles.map((c, idx) => {
              const isLatest = idx === cycles.length - 1;
              const cplGoal = acct.cplGoal || c.cplGoal;
              return `
              <tr class="table-row border-b border-dark-700/50 ${isLatest ? 'bg-brand-500/5' : ''}">
                <td class="py-2.5 px-3 text-white font-medium whitespace-nowrap">${c.cycle} ${isLatest ? '<span class="badge badge-blue ml-1">Current</span>' : ''}</td>
                <td class="py-2.5 px-3 text-dark-300 whitespace-nowrap">${c.cycleStartDate || '—'}</td>
                <td class="py-2.5 px-3 text-dark-300 whitespace-nowrap">${c.cycleEndDate || '—'}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${fmt(c.bookedGoal)}</td>
                <td class="py-2.5 px-3 text-right text-white font-medium">${fmt(c.totalLeads)}</td>
                <td class="py-2.5 px-3 text-right"><span class="${c.osaPct !== null ? (c.osaPct >= 10 ? 'text-green-400' : c.osaPct >= 5 ? 'text-yellow-400' : 'text-red-400') : 'text-dark-400'}">${fmtPct(c.osaPct)}</span></td>
                <td class="py-2.5 px-3 text-right text-white">${fmt(c.bookedAppts)}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${fmt(c.estBookedAppts)}</td>
                <td class="py-2.5 px-3 text-right text-dark-400">${fmtDollar(c.cplGoal,2)}</td>
                <td class="py-2.5 px-3 text-right"><span class="${cplGoal && c.cpl > cplGoal ? 'text-red-400' : 'text-white'}">${fmtDollar(c.cpl,2)}</span></td>
                <td class="py-2.5 px-3 text-right text-white">${fmtDollar(c.amountSpent,2)}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${c.linkCTR ? (c.linkCTR*100).toFixed(2)+'%' : '—'}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${fmtDollar(c.linkCPC,2)}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${fmtDollar(c.cpm,2)}</td>
                <td class="py-2.5 px-3 text-right ${c.frequency && c.frequency > 3 ? 'text-yellow-400' : 'text-dark-300'}">${c.frequency ? c.frequency.toFixed(2) : '—'}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${c.surveyPct ? c.surveyPct.toFixed(2)+'%' : '—'}</td>
                <td class="py-2.5 px-3 text-center">${c.billed === 'Yes' ? '<span class="badge badge-green">Yes</span>' : c.goodToBill === 'Yes' ? '<span class="badge badge-yellow">Ready</span>' : '<span class="badge badge-gray">No</span>'}</td>
              </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    ${latest && latest.notes ? `
    <div class="glass rounded-xl p-4 mt-4">
      <h4 class="text-dark-400 text-xs uppercase tracking-wider mb-2">Notes</h4>
      <p class="text-dark-200 text-sm">${latest.notes}</p>
    </div>` : ''}
  `;

  // Render charts
  if (cycles.length > 1) {
    renderAccountCPLChart(cycles, acct.cplGoal);
    renderAccountLeadsChart(cycles);
  }
}

function renderAccountCPLChart(cycles, goalCPL) {
  const ctx = document.getElementById('chart-acct-cpl');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'CPL',
          data: cycles.map(c => c.cpl),
          borderColor: '#f97316',
          backgroundColor: 'rgba(249,115,22,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#f97316',
        },
        ...(goalCPL ? [{
          label: 'Goal',
          data: cycles.map(() => goalCPL),
          borderColor: 'rgba(148,163,184,0.4)',
          borderDash: [5,5],
          pointRadius: 0,
          fill: false,
        }] : [])
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } }
      }
    }
  });
}

function renderAccountLeadsChart(cycles) {
  const ctx = document.getElementById('chart-acct-leads');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Total Leads',
          data: cycles.map(c => c.totalLeads),
          backgroundColor: 'rgba(59,130,246,0.5)',
          borderRadius: 4,
        },
        {
          label: 'Booked',
          data: cycles.map(c => c.bookedAppts),
          backgroundColor: 'rgba(34,197,94,0.5)',
          borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(100,116,139,0.1)' } }
      }
    }
  });
}

// ═══════════════════════════════════════════════
// RENDER: BILLING TRACKER
// ═══════════════════════════════════════════════
function renderBilling() {
  const el = document.getElementById('view-billing');
  el.classList.remove('hidden');

  const billingData = [];
  allAccounts.filter(a => !a.isPaused).forEach(a => {
    const latest = getLatestCycle(a.name, a.adAccountId);
    if (!latest) return;
    billingData.push({
      account: a,
      cycle: latest.cycle,
      spent: latest.amountSpent,
      goodToBill: latest.goodToBill,
      billed: latest.billed,
      billingNotes: latest.billingNotes,
      monthlyBudget: a.monthlyBudget || latest.monthlyBudget,
    });
  });

  const readyToBill = billingData.filter(b => b.goodToBill === 'Yes' && b.billed !== 'Yes');
  const billed = billingData.filter(b => b.billed === 'Yes');
  const notReady = billingData.filter(b => b.goodToBill !== 'Yes' && b.billed !== 'Yes');
  const totalBilled = billed.reduce((s,b) => s + (b.monthlyBudget || 0), 0);
  const totalReady = readyToBill.reduce((s,b) => s + (b.monthlyBudget || 0), 0);

  el.innerHTML = `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">Billing Tracker</h1>
      <p class="text-dark-300 text-sm mt-1">Current cycle billing status</p>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase">Ready to Bill</div>
        <div class="text-2xl font-bold text-yellow-400">${readyToBill.length}</div>
        <div class="text-xs text-dark-400">${fmtDollar(totalReady)}</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase">Billed</div>
        <div class="text-2xl font-bold text-green-400">${billed.length}</div>
        <div class="text-xs text-dark-400">${fmtDollar(totalBilled)}</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase">Not Ready</div>
        <div class="text-2xl font-bold text-dark-300">${notReady.length}</div>
      </div>
      <div class="glass rounded-xl p-4 kpi-card">
        <div class="text-dark-400 text-xs uppercase">Total Accounts</div>
        <div class="text-2xl font-bold text-white">${billingData.length}</div>
      </div>
    </div>

    ${readyToBill.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
        <h3 class="text-white font-semibold">Ready to Bill (${readyToBill.length})</h3>
      </div>
      <table class="w-full text-sm">
        <tbody>
          ${readyToBill.map(b => `
            <tr class="table-row border-b border-dark-700/50">
              <td class="py-3 px-4 text-white font-medium">${b.account.name}</td>
              <td class="py-3 px-4 text-dark-300">${b.cycle}</td>
              <td class="py-3 px-4 text-right text-white">${fmtDollar(b.monthlyBudget)}</td>
              <td class="py-3 px-4 text-dark-400">${b.billingNotes || ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <div class="glass rounded-xl overflow-hidden">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-500"></span>
        <h3 class="text-white font-semibold">Already Billed (${billed.length})</h3>
      </div>
      <table class="w-full text-sm">
        <tbody>
          ${billed.map(b => `
            <tr class="table-row border-b border-dark-700/50">
              <td class="py-3 px-4 text-white font-medium">${b.account.name}</td>
              <td class="py-3 px-4 text-dark-300">${b.cycle}</td>
              <td class="py-3 px-4 text-right text-white">${fmtDollar(b.monthlyBudget)}</td>
              <td class="py-3 px-4"><span class="badge badge-green">Billed</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════
function esc(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadAllData();
</script>
</body>
</html>
