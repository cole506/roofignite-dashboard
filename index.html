<script>
// ═══════════════════════════════════════════════
// DATA LAYER — Google Sheets Integration
// ═══════════════════════════════════════════════
const SHEET_ID = '1W560POSt6T4QsNObZGxz2BKyCNvRIW7dubAxhIVkAy4';
const SHEETS = {
  'Pod 2 - RoofIgnite': 0,
  'Pod 1 - RoofIgnite': 295240236
};
const LEAD_SHEETS = {
  'ALL_ROOF': 1440123496,
  'ALL_CiGN': 951162408
};

const KPI_TARGETS = {
  linkCTR: 0.90,    // 0.90% — values are already in percentage form
  linkCPC: 3.00,
  cpm: 20.00,
  frequency: 2.50,
  surveyPct: 2.00,
  osaPct: 20         // 20% — values normalized to percentage form during parsing
};

let allAccounts = [];
let allCycles = [];
let allLeads = [];
let currentView = 'dashboard';
let currentPod = null;
let currentAccount = null;
let currentManager = null;

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Normalize percentage values: if value is between 0 and 1 (exclusive), multiply by 100
// This handles sheets that store 15% as 0.15 vs 15
function normPct(v) {
  if (v === null || v === undefined) return null;
  if (v > 0 && v < 1) return v * 100;
  return v;
}

async function fetchSheetData(sheetName, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonStr) throw new Error('Failed to parse response');
    const data = JSON.parse(jsonStr[1]);
    return parseSheetData(data, sheetName);
  } catch (e) {
    console.error(`Error fetching ${sheetName}:`, e);
    return { accounts: [], cycles: [] };
  }
}

// CSV export bypasses Google Sheets filters (gviz only returns filtered/visible rows)
async function fetchLeadData(sheetName, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    return parseLeadCSV(text, sheetName);
  } catch (e) {
    console.error(`Error fetching leads ${sheetName}:`, e);
    return [];
  }
}

// Parse a CSV string, handling quoted fields with commas/newlines
function parseCSVRow(line) {
  const cells = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { cells.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  cells.push(cur);
  return cells;
}

// Split CSV text into rows, respecting quoted fields that span multiple lines
function splitCSVLines(text) {
  const rows = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') inQuotes = !inQuotes;
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (cur.length > 0) rows.push(cur);
      if (ch === '\r' && text[i+1] === '\n') i++;
      cur = '';
    } else {
      cur += ch;
    }
  }
  if (cur.length > 0) rows.push(cur);
  return rows;
}

function parseLeadCSV(csvText, source) {
  const lines = splitCSVLines(csvText);
  if (lines.length < 2) return [];

  // Build column map from header row (case-insensitive partial match)
  const headerCells = parseCSVRow(lines[0]);
  const findCol = (...keywords) => {
    for (const kw of keywords) {
      const idx = headerCells.findIndex(h => h.toLowerCase().trim().includes(kw.toLowerCase()));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const COL_VA       = findCol('va');
  const COL_DATE     = findCol('date');
  const COL_SUB      = findCol('sub account', 'subaccount');
  const COL_NAME     = findCol('name');
  const COL_STATUS   = findCol('status');

  const leads = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseCSVRow(lines[i]);
    const subAccount = COL_SUB >= 0 ? (cells[COL_SUB] || '').trim() : '';
    const dateRaw    = COL_DATE >= 0 ? (cells[COL_DATE] || '').trim() : '';
    if (!subAccount || !dateRaw) continue;

    // Normalize date: "M/D/YYYY" → "YYYY-MM-DD"
    let dateStr = dateRaw;
    const dm = dateRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (dm) {
      dateStr = `${dm[3]}-${dm[1].padStart(2,'0')}-${dm[2].padStart(2,'0')}`;
    }

    leads.push({
      source,
      va:         COL_VA >= 0 ? (cells[COL_VA] || '').trim() : '',
      date:       dateStr,
      subAccount,
      name:       COL_NAME >= 0 ? (cells[COL_NAME] || '').trim() : '',
      status:     COL_STATUS >= 0 ? (cells[COL_STATUS] || '').trim() : '',
    });
  }
  return leads;
}

// Build a column name → index map from the header row (data.table.cols)
// Uses case-insensitive partial matching so column rearrangements don't break anything
function buildColumnMap(cols) {
  const map = {};
  if (!cols || !cols.length) return map;
  cols.forEach((col, idx) => {
    const label = (col.label || '').trim();
    if (label) map[label.toLowerCase()] = idx;
  });
  return map;
}

// Find a column index by trying multiple possible header names (case-insensitive, partial match)
function colIdx(colMap, ...names) {
  // First try exact matches
  for (const name of names) {
    const key = name.toLowerCase();
    if (colMap[key] !== undefined) return colMap[key];
  }
  // Then try partial/includes matches
  const keys = Object.keys(colMap);
  for (const name of names) {
    const lower = name.toLowerCase();
    const found = keys.find(k => k.includes(lower) || lower.includes(k));
    if (found !== undefined) return colMap[found];
  }
  return -1; // not found
}

function parseSheetData(data, podName) {
  const rows = data.table.rows;
  const accounts = [];
  const cycles = [];
  let currentAccountName = '';
  let currentAdAccountId = '';
  let currentSection = '';
  let currentMgr = '';

  // === DYNAMIC COLUMN MAPPING ===
  // Read header labels from gviz cols array instead of hardcoding indices
  const colMap = buildColumnMap(data.table.cols);
  console.log(`[${podName}] Column map:`, colMap);

  // Map each field to its column index by header name
  // Columns A, B, C (indices 0, 1, 2) are structural — account name, cycle label, ad account id
  // Everything else is looked up dynamically
  const COL = {
    cycleStart:    colIdx(colMap, 'cycle start date', 'cycle start', 'start date'),
    cycleEnd:      colIdx(colMap, 'cycle end date', 'cycle end', 'end date'),
    bookedGoal:    colIdx(colMap, 'booked appointment goal', 'booked appt goal', 'appt goal', 'appointment goal'),
    gregGoal:      colIdx(colMap, 'greg goal', 'greg\'s goal'),
    totalLeads:    colIdx(colMap, 'total leads', 'leads'),
    osaPct:        colIdx(colMap, 'osa', 'osa %', 'osa rate', 'osa pct'),
    bookedAppts:   colIdx(colMap, 'booked appointments', 'booked appts', 'booked'),
    estBooked:     colIdx(colMap, 'est. booked', 'est booked', 'estimated booked'),
    cpaGoal:       colIdx(colMap, 'cpa goal', 'cpl goal', 'cost per appt goal'),
    cpa:           colIdx(colMap, 'cpa', 'cpl', 'cost per appt', 'cost per lead'),
    dailyBudget:   colIdx(colMap, 'daily budget', 'daily'),
    monthlyBudget: colIdx(colMap, 'monthly budget', 'monthly'),
    amountSpent:   colIdx(colMap, 'amount spent', 'spent', 'total spent'),
    linkCTR:       colIdx(colMap, 'link ctr', 'ctr'),
    linkCPC:       colIdx(colMap, 'link cpc', 'cpc'),
    cpm:           colIdx(colMap, 'cpm'),
    frequency:     colIdx(colMap, 'frequency', 'freq'),
    surveyPct:     colIdx(colMap, 'survey', 'survey %', 'survey pct', 'survey rate'),
    manager:       colIdx(colMap, 'account manager', 'manager', 'acct manager'),
    notes:         colIdx(colMap, 'notes', 'note'),
    goodToBill:    colIdx(colMap, 'good to bill', 'ready to bill'),
    billed:        colIdx(colMap, 'billed'),
    billingNotes:  colIdx(colMap, 'billing notes', 'billing note'),
  };
  console.log(`[${podName}] Resolved column indices:`, COL);

  // Helper to safely read a cell value by column key
  function getStr(row, colKey) {
    const idx = COL[colKey];
    if (idx === undefined || idx < 0 || !row.c || !row.c[idx]) return '';
    return String(row.c[idx].v || '').trim();
  }

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row.c) continue;

    const cellA = row.c[0] ? (row.c[0].v || '') : '';
    const cellB = row.c[1] ? (row.c[1].v || '') : '';
    const cellC = row.c[2] ? (row.c[2].v || '') : '';

    if (!cellA && !cellB && !cellC) continue;

    // Section/label row: has ONLY cellA, nothing in any other column (no B, no C, no data cols)
    // This catches manager names (Cole, Tyler), sub-headers (RoofIgnite, Pending), section labels (EXPANSION, KPI), etc.
    if (cellA && !cellB && !cellC) {
      const hasAnyData = row.c.slice(3).some(c => c && c.v !== null && c.v !== undefined && c.v !== '');
      if (!hasAnyData) {
        currentSection = cellA;
        continue;
      }
    }

    const hasAdAccountId = cellC && String(cellC).replace(/\s/g,'').length > 5 && /^\d+$/.test(String(cellC).replace(/\s/g,''));

    const cellBStr = String(cellB).trim();
    const cellBLower = cellBStr.toLowerCase();
    const isCycleLabel = cellBStr && (cellBLower.startsWith('cycle') || (cellBLower.includes('winter') && cellBLower.includes('cycle')));

    const isPausedStatus = cellBStr && !isCycleLabel &&
      (cellBStr.toUpperCase() === 'PAUSED' || cellBStr.toUpperCase() === 'PAUSE' || cellBStr.toUpperCase() === 'WINTER');

    // Account header row: has a name (cellA), no cycle label in cellB (or paused status), and is not a section
    if (cellA && !isCycleLabel && (!cellBStr || isPausedStatus)) {
      currentAccountName = cellA.trim();
      currentAdAccountId = hasAdAccountId ? String(cellC).replace(/\s/g,'').trim() : '';

      const mgr = getStr(row, 'manager');
      if (mgr) currentMgr = mgr;

      accounts.push({
        name: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        section: currentSection,
        manager: currentMgr || 'Unassigned',
        isPaused: isPausedStatus,
        bookedGoal:    COL.bookedGoal >= 0 ? getNum(row, COL.bookedGoal) : null,
        gregGoal:      COL.gregGoal >= 0 ? getNum(row, COL.gregGoal) : null,
        cpaGoal:       COL.cpaGoal >= 0 ? getNum(row, COL.cpaGoal) : null,
        dailyBudget:   COL.dailyBudget >= 0 ? getNum(row, COL.dailyBudget) : null,
        monthlyBudget: COL.monthlyBudget >= 0 ? getNum(row, COL.monthlyBudget) : null,
        cycles: []
      });
      continue;
    }

    if (isCycleLabel && currentAccountName) {
      const rowMgr = getStr(row, 'manager');
      if (rowMgr) currentMgr = rowMgr;

      const cycleData = {
        account: currentAccountName,
        adAccountId: currentAdAccountId,
        pod: podName,
        manager: currentMgr || 'Unassigned',
        cycle: cellBStr,
        cycleStartDate: COL.cycleStart >= 0 ? getDate(row, COL.cycleStart) : null,
        cycleEndDate:   COL.cycleEnd >= 0 ? getDate(row, COL.cycleEnd) : null,
        bookedGoal:     COL.bookedGoal >= 0 ? getNum(row, COL.bookedGoal) : null,
        gregGoal:       COL.gregGoal >= 0 ? getNum(row, COL.gregGoal) : null,
        totalLeads:     COL.totalLeads >= 0 ? getNum(row, COL.totalLeads) : null,
        osaPct:         COL.osaPct >= 0 ? normPct(getNum(row, COL.osaPct)) : null,
        bookedAppts:    COL.bookedAppts >= 0 ? getNum(row, COL.bookedAppts) : null,
        estBookedAppts: COL.estBooked >= 0 ? getNum(row, COL.estBooked) : null,
        cpaGoal:        COL.cpaGoal >= 0 ? getNum(row, COL.cpaGoal) : null,
        cpa:            COL.cpa >= 0 ? getNum(row, COL.cpa) : null,
        dailyBudget:    COL.dailyBudget >= 0 ? getNum(row, COL.dailyBudget) : null,
        monthlyBudget:  COL.monthlyBudget >= 0 ? getNum(row, COL.monthlyBudget) : null,
        amountSpent:    COL.amountSpent >= 0 ? getNum(row, COL.amountSpent) : null,
        linkCTR:        COL.linkCTR >= 0 ? getNum(row, COL.linkCTR) : null,
        linkCPC:        COL.linkCPC >= 0 ? getNum(row, COL.linkCPC) : null,
        cpm:            COL.cpm >= 0 ? getNum(row, COL.cpm) : null,
        frequency:      COL.frequency >= 0 ? getNum(row, COL.frequency) : null,
        surveyPct:      COL.surveyPct >= 0 ? normPct(getNum(row, COL.surveyPct)) : null,
        accountManager: rowMgr || currentMgr,
        notes:          COL.notes >= 0 ? getStr(row, 'notes') : '',
        goodToBill:     COL.goodToBill >= 0 ? getStr(row, 'goodToBill') : '',
        billed:         COL.billed >= 0 ? getStr(row, 'billed') : '',
        billingNotes:   COL.billingNotes >= 0 ? getStr(row, 'billingNotes') : '',
      };

      cycles.push(cycleData);
      const parentAcct = accounts.find(a => a.name === currentAccountName && a.adAccountId === currentAdAccountId);
      if (parentAcct) parentAcct.cycles.push(cycleData);
    }
  }

  return { accounts, cycles };
}

function getNum(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const v = row.c[idx].v;
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function getDate(row, idx) {
  if (!row.c || !row.c[idx]) return null;
  const cell = row.c[idx];
  const v = cell.v;
  if (!v) return null;

  // Try parsing Date() format first (most reliable from gviz)
  if (typeof v === 'string' && v.includes('Date(')) {
    const m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if (m) return `${m[1]}-${String(Number(m[2])+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }

  // Try formatted value
  if (cell.f) {
    const d = new Date(cell.f);
    if (!isNaN(d.getTime())) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return cell.f;
  }

  // Try raw string value
  if (typeof v === 'string') {
    const d = new Date(v);
    if (!isNaN(d.getTime())) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return v;
  }

  // Numeric (Excel serial date) — convert
  if (typeof v === 'number') {
    const d = new Date((v - 25569) * 86400 * 1000);
    if (!isNaN(d.getTime())) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  return String(v);
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmt(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtDollar(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(0) + '%';
}
function fmtPctDec(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(decimals) + '%';
}
function fmtDate(dateStr) {
  if (!dateStr || dateStr === '—') return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Metric coloring helpers
function osaColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v < KPI_TARGETS.osaPct ? 'metric-good' : 'metric-bad';
}
function cpaColor(v, goal) {
  if (v === null || v === undefined) return 'text-dark-400';
  if (!goal) return 'metric-neutral';
  return v <= goal ? 'metric-good' : 'metric-bad';
}
function ctrColor(v) {
  if (v === null || v === undefined || v === 0) return 'text-dark-400';
  // v is already in percentage form (1.04 = 1.04%), compare to target also in % form
  return v >= KPI_TARGETS.linkCTR ? 'metric-good' : 'metric-bad';
}
function cpcColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.linkCPC ? 'metric-good' : 'metric-bad';
}
function cpmColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.cpm ? 'metric-good' : 'metric-bad';
}
function freqColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v <= KPI_TARGETS.frequency ? 'metric-good' : (v <= 3.5 ? 'metric-warn' : 'metric-bad');
}
function surveyColor(v) {
  if (v === null || v === undefined) return 'text-dark-400';
  return v >= KPI_TARGETS.surveyPct ? 'metric-good' : 'metric-bad';
}

// Lead status color: green=booked, red=cancelled/invalid, white=other
function leadStatusColor(status) {
  if (!status) return 'lead-other';
  const s = status.toLowerCase();
  if (s.includes('confirmed') || s.includes('manual booked') || s.includes('client handles')) return 'lead-booked';
  if (s.includes('cancel') || s.includes('invalid')) return 'lead-cancelled';
  return 'lead-other';
}

function isBookedStatus(status) {
  if (!status) return false;
  const s = status.toLowerCase();
  return s.includes('confirmed') || s.includes('manual booked') || s.includes('client handles');
}

function isCancelledStatus(status) {
  if (!status) return false;
  const s = status.toLowerCase();
  return s.includes('cancel') || s.includes('invalid');
}

// ═══════════════════════════════════════════════
// ACTIVE CYCLE LOGIC — cycles containing today
// ═══════════════════════════════════════════════
function getActiveCycle(accountName, adAccountId) {
  const acctCycles = allCycles.filter(c => c.account === accountName && c.adAccountId === adAccountId);
  if (!acctCycles.length) return null;
  const today = getTodayStr();
  const active = acctCycles.find(c => c.cycleStartDate && c.cycleEndDate && c.cycleStartDate <= today && c.cycleEndDate >= today);
  return active || acctCycles[acctCycles.length - 1]; // fallback to latest
}

function hasActiveCycle(acct) {
  const today = getTodayStr();
  return (acct.cycles || []).some(c => c.cycleStartDate && c.cycleEndDate && c.cycleStartDate <= today && c.cycleEndDate >= today);
}

// On-track: Est. Booked Appts >= 80% of Booked Appointment Goal
function isOnTrack(cycle) {
  if (!cycle) return null;
  if (cycle.estBookedAppts === null || cycle.bookedGoal === null || !cycle.bookedGoal) return null;
  return cycle.estBookedAppts >= 0.8 * cycle.bookedGoal;
}

function onTrackBadge(cycle) {
  const track = isOnTrack(cycle);
  if (track === null) return '<span class="badge badge-gray">N/A</span>';
  return track
    ? '<span class="w-2 h-2 rounded-full bg-green-500 inline-block" title="On Track"></span>'
    : '<span class="w-2 h-2 rounded-full bg-red-500 inline-block" title="Off Track"></span>';
}

// ═══════════════════════════════════════════════
// MANAGER & ALERTS LOGIC
// ═══════════════════════════════════════════════
// FIX: Check ALL cycles and account-level manager, not just active cycle
function getAccountsByManager(mgrName) {
  const mgrLower = mgrName.toLowerCase();
  return allAccounts.filter(a => {
    // Check account-level manager
    const acctMgr = (a.manager || '').toLowerCase();
    if (acctMgr === mgrLower || acctMgr.includes(mgrLower)) return true;
    // Check ANY cycle for this manager name
    return (a.cycles || []).some(c => {
      const mgr = (c.accountManager || c.manager || '').toLowerCase();
      return mgr === mgrLower || mgr.includes(mgrLower);
    });
  });
}

function getAlertAccountsForManager(mgrName) {
  const mgrAccounts = getAccountsByManager(mgrName).filter(a => hasActiveCycle(a));
  const alerts = [];
  mgrAccounts.forEach(acct => {
    const active = getActiveCycle(acct.name, acct.adAccountId);
    if (!active) return;
    const issues = [];

    if (active.osaPct !== null && active.osaPct >= KPI_TARGETS.osaPct && active.totalLeads > 5) issues.push({ type: 'danger', msg: `High OSA: ${fmtPct(active.osaPct)}` });
    if (acct.cpaGoal && active.cpa && active.cpa > acct.cpaGoal * 1.5) issues.push({ type: 'danger', msg: `CPA ${fmtDollar(active.cpa,2)} far exceeds goal ${fmtDollar(acct.cpaGoal,2)}` });
    else if (acct.cpaGoal && active.cpa && active.cpa > acct.cpaGoal * 1.15) issues.push({ type: 'warning', msg: `CPA ${fmtDollar(active.cpa,2)} above goal ${fmtDollar(acct.cpaGoal,2)}` });
    if (active.totalLeads !== null && active.totalLeads === 0) issues.push({ type: 'danger', msg: 'Zero leads this cycle' });
    if (active.linkCTR !== null && active.linkCTR > 0 && active.linkCTR < KPI_TARGETS.linkCTR) issues.push({ type: 'warning', msg: `Low CTR: ${fmtPctDec(active.linkCTR)}` });
    if (active.frequency !== null && active.frequency > 4) issues.push({ type: 'warning', msg: `High frequency: ${active.frequency.toFixed(1)}` });

    // On-track check
    const track = isOnTrack(active);
    if (track === false) issues.push({ type: 'warning', msg: `Off track: Est. ${fmt(active.estBookedAppts)} / ${fmt(active.bookedGoal)} goal` });

    if (issues.length) alerts.push({ account: acct, active, issues });
  });
  return alerts.sort((a, b) => b.issues.filter(i => i.type === 'danger').length - a.issues.filter(i => i.type === 'danger').length);
}

function getAllAlerts() {
  const alerts = [];
  allAccounts.filter(a => hasActiveCycle(a)).forEach(acct => {
    const active = getActiveCycle(acct.name, acct.adAccountId);
    if (!active) return;
    const issues = [];
    if (active.osaPct !== null && active.osaPct >= KPI_TARGETS.osaPct && active.totalLeads > 5) issues.push({ type: 'danger', msg: `High OSA: ${fmtPct(active.osaPct)}` });
    if (acct.cpaGoal && active.cpa && active.cpa > acct.cpaGoal * 1.5) issues.push({ type: 'danger', msg: `CPA ${fmtDollar(active.cpa,2)} far exceeds goal` });
    if (active.totalLeads !== null && active.totalLeads === 0) issues.push({ type: 'danger', msg: 'Zero leads this cycle' });
    const track = isOnTrack(active);
    if (track === false) issues.push({ type: 'warning', msg: `Off track: Est. ${fmt(active.estBookedAppts)} / ${fmt(active.bookedGoal)} goal` });
    if (issues.length) alerts.push({ account: acct, active, issues });
  });
  return alerts.sort((a, b) => b.issues.filter(i => i.type === 'danger').length - a.issues.filter(i => i.type === 'danger').length);
}

function getAccountsByPod(podName) { return allAccounts.filter(a => a.pod === podName); }

function getLeadsForAccount(accountName, startDate, endDate) {
  return allLeads.filter(l => {
    const nameMatch = l.subAccount.toLowerCase().includes(accountName.toLowerCase()) || accountName.toLowerCase().includes(l.subAccount.toLowerCase());
    if (!nameMatch) return false;
    if (startDate && endDate && l.date) {
      return l.date >= startDate && l.date <= endDate;
    }
    return true;
  });
}

// ═══════════════════════════════════════════════
function navigate(view, param) {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  currentView = view;

  switch(view) {
    case 'dashboard':
      document.getElementById('nav-dashboard').classList.add('active');
      renderDashboard();
      break;
    case 'pod':
      currentPod = param;
      if (param === 'Pod 2 - RoofIgnite') document.getElementById('nav-pod2').classList.add('active');
      else document.getElementById('nav-pod1').classList.add('active');
      renderPodView(param);
      break;
    case 'manager':
      currentManager = param;
      const navId = 'nav-mgr-' + param.toLowerCase();
      const navEl = document.getElementById(navId);
      if (navEl) navEl.classList.add('active');
      renderManagerView(param);
      break;
    case 'account':
      renderAccountDetail(param.name, param.adAccountId);
      break;
    case 'billing':
      document.getElementById('nav-billing').classList.add('active');
      renderBilling();
      break;
  }
}

function navigateToAccount(val) {
  if (!val) return;
  const [name, adId] = val.split('|||');
  navigate('account', { name, adAccountId: adId });
}

      const aRatio = a.cycle.estBookedAppts / a.cycle.bookedGoal;
      const bRatio = b.cycle.estBookedAppts / b.cycle.bookedGoal;
      return bRatio - aRatio;
    }).slice(0, 5);

  document.getElementById('top-performers').innerHTML = onTrackAccts.map(p => `

    </div>

  const attention = alerts.slice(0, 5);

    </div>
  `).join('') || '<div class="text-dark-400 text-sm text-center py-4">All clear!</div>';

  renderCPADistChart();
  renderOSAChart();
}

function renderCPADistChart() {
  const ctx = document.getElementById('chart-cpa-dist');
  if (!ctx) return;
  const active = allAccounts.filter(a => hasActiveCycle(a));
  const data = active.map(a => {
    const c = getActiveCycle(a.name, a.adAccountId);
    return c && c.cpa > 0 ? { name: a.name, cpa: c.cpa, goal: a.cpaGoal || c.cpaGoal } : null;
  }).filter(Boolean).sort((a,b) => a.cpa - b.cpa).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{ label: 'CPA', data: data.map(d => d.cpa),
        backgroundColor: data.map(d => d.goal && d.cpa > d.goal ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)'), borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

function renderOSAChart() {
  const ctx = document.getElementById('chart-osa');
  if (!ctx) return;
  const active = allAccounts.filter(a => hasActiveCycle(a));
  const data = active.map(a => {
    const c = getActiveCycle(a.name, a.adAccountId);
    return c && c.osaPct !== null ? { name: a.name, osa: c.osaPct } : null;
  }).filter(Boolean).sort((a,b) => a.osa - b.osa).slice(0, 20);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name.length > 15 ? d.name.substring(0,15)+'...' : d.name),
      datasets: [{ label: 'OSA %', data: data.map(d => d.osa),
        backgroundColor: data.map(d => d.osa < 20 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)'), borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: 'rgba(100,116,139,0.1)' } },
        y: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } } }
    }
  });
}

            ${cycles.map((c) => {
              const today = getTodayStr();
              const isActiveCyc = c.cycleStartDate && c.cycleEndDate && c.cycleStartDate <= today && c.cycleEndDate >= today;
              const cGoal = acct.cpaGoal || c.cpaGoal;
              return `
              <tr class="table-row border-b border-dark-700/50 ${isActiveCyc ? 'bg-brand-500/5' : ''}">
                <td class="py-2.5 px-3 text-white font-medium whitespace-nowrap">${c.cycle} ${isActiveCyc ? '<span class="badge badge-blue ml-1">Active</span>' : ''}</td>
                <td class="py-2.5 px-3 text-dark-300 whitespace-nowrap">${fmtDate(c.cycleStartDate)}</td>
                <td class="py-2.5 px-3 text-dark-300 whitespace-nowrap">${fmtDate(c.cycleEndDate)}</td>
                <td class="py-2.5 px-3 text-right text-dark-300">${fmt(c.bookedGoal)}</td>
                <td class="py-2.5 px-3 text-right text-white font-medium">${fmt(c.totalLeads)}</td>
                <td class="py-2.5 px-3 text-right"><span class="${osaColor(c.osaPct)}">${fmtPct(c.osaPct)}</span></td>
                <td class="py-2.5 px-3 text-right text-white">${fmt(c.bookedAppts)}</td>
                <td class="py-2.5 px-3 text-right text-white">${fmt(c.estBookedAppts)}</td>
                <td class="py-2.5 px-3 text-right text-dark-400">${fmtDollar(c.cpaGoal,2)}</td>
                <td class="py-2.5 px-3 text-right"><span class="${cpaColor(c.cpa, cGoal)}">${fmtDollar(c.cpa,2)}</span></td>
                <td class="py-2.5 px-3 text-right text-white">${fmtDollar(c.amountSpent,2)}</td>
                <td class="py-2.5 px-3 text-right"><span class="${ctrColor(c.linkCTR)}">${c.linkCTR ? fmtPctDec(c.linkCTR) : '—'}</span></td>
                <td class="py-2.5 px-3 text-right"><span class="${cpcColor(c.linkCPC)}">${fmtDollar(c.linkCPC,2)}</span></td>
                <td class="py-2.5 px-3 text-right"><span class="${cpmColor(c.cpm)}">${fmtDollar(c.cpm,2)}</span></td>
                <td class="py-2.5 px-3 text-right"><span class="${freqColor(c.frequency)}">${c.frequency ? c.frequency.toFixed(2) : '—'}</span></td>
                <td class="py-2.5 px-3 text-center">${onTrackBadge(c)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    ${activeCyc && activeCyc.notes ? `
    <div class="glass rounded-xl p-4 mt-4">
      <h4 class="text-dark-400 text-xs uppercase tracking-wider mb-2">Notes</h4>
      <p class="text-dark-200 text-sm">${activeCyc.notes}</p>
    </div>` : ''}
  `;

  if (cycles.length > 1) {
    renderAccountCPAChart(cycles, acct.cpaGoal);
    renderAccountLeadsChart(cycles);
  }

  renderLeadBreakdown(acct, cycles);
}

function renderLeadBreakdown(acct, cycles) {
  const container = document.getElementById('lead-breakdown');
  if (!container) return;

  const accountLeads = allLeads.filter(l =>
    l.subAccount.toLowerCase().includes(acct.name.toLowerCase()) ||
    acct.name.toLowerCase().includes(l.subAccount.toLowerCase())
  );

  if (!accountLeads.length) {
    container.innerHTML = '';
    return;
  }

  const today = getTodayStr();
  let cycleBreakdowns = [];
  cycles.forEach((c, idx) => {
    if (!c.cycleStartDate || !c.cycleEndDate) return;
    const start = c.cycleStartDate;
    const end = c.cycleEndDate;
    const cycleLeads = accountLeads.filter(l => l.date && l.date >= start && l.date <= end);
    const isActiveCyc = c.cycleStartDate <= today && c.cycleEndDate >= today;
    if (cycleLeads.length > 0 || isActiveCyc) {
      cycleBreakdowns.push({ cycle: c, leads: cycleLeads, isActive: isActiveCyc });
    }
  });

  if (!cycleBreakdowns.length && accountLeads.length > 0) {
    cycleBreakdowns.push({ cycle: { cycle: 'All Leads' }, leads: accountLeads, isActive: true });
  }

  if (!cycleBreakdowns.length) { container.innerHTML = ''; return; }

  // Show active cycle breakdown by default, fallback to latest
  const activeBreakdown = cycleBreakdowns.find(b => b.isActive) || cycleBreakdowns[cycleBreakdowns.length - 1];
  const leads = activeBreakdown.leads;

  // Group by date
  const byDate = {};
  leads.forEach(l => {
    const d = l.date || 'Unknown';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(l);
  });
  const dates = Object.keys(byDate).sort();

  // Group by week
  const weeks = { 'Week 1': [], 'Week 2': [], 'Week 3': [], 'Week 4': [], 'Week 5+': [] };
  if (activeBreakdown.cycle.cycleStartDate) {
    const startMs = new Date(activeBreakdown.cycle.cycleStartDate).getTime();
    leads.forEach(l => {
      if (!l.date) return;
      const dayDiff = Math.floor((new Date(l.date).getTime() - startMs) / (86400000));
      if (dayDiff < 7) weeks['Week 1'].push(l);
      else if (dayDiff < 14) weeks['Week 2'].push(l);
      else if (dayDiff < 21) weeks['Week 3'].push(l);
      else if (dayDiff < 28) weeks['Week 4'].push(l);
      else weeks['Week 5+'].push(l);
    });
  }

  const booked = leads.filter(l => isBookedStatus(l.status)).length;
  const cancelled = leads.filter(l => isCancelledStatus(l.status)).length;
  const other = leads.length - booked - cancelled;

  container.innerHTML = `
    <div class="glass rounded-xl p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-white font-semibold">Lead Breakdown — ${activeBreakdown.cycle.cycle}</h3>
        <div class="flex gap-2 text-xs">
          <span class="badge badge-green">${booked} booked</span>
          <span class="badge badge-red">${cancelled} cancelled/invalid</span>
          <span class="badge badge-gray">${other} other</span>
          <span class="badge badge-blue">${leads.length} total</span>
        </div>
      </div>

      <!-- Week Breakdown -->
      <div class="grid grid-cols-5 gap-3 mb-4">
        ${Object.entries(weeks).filter(([k,v]) => v.length > 0 || k !== 'Week 5+').slice(0,4).map(([week, wLeads]) => {
          const wBooked = wLeads.filter(l => isBookedStatus(l.status)).length;
          const wCancelled = wLeads.filter(l => isCancelledStatus(l.status)).length;
          return `
          <div class="bg-dark-800/50 rounded-lg p-3">
            <div class="text-dark-400 text-[10px] uppercase tracking-wider mb-1">${week}</div>
            <div class="text-white font-bold text-lg">${wLeads.length}</div>
            <div class="text-xs"><span class="lead-booked">${wBooked} booked</span> · <span class="lead-cancelled">${wCancelled} canc.</span></div>
          </div>`;
        }).join('')}
        ${weeks['Week 5+'].length > 0 ? `
        <div class="bg-dark-800/50 rounded-lg p-3">
          <div class="text-dark-400 text-[10px] uppercase tracking-wider mb-1">Week 5+</div>
          <div class="text-white font-bold text-lg">${weeks['Week 5+'].length}</div>
        </div>` : ''}
      </div>

      <!-- Day-by-Day with individual leads -->
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-dark-600 text-dark-400 uppercase tracking-wider">
              <th class="text-left py-2 px-2 font-medium">Date</th>
              <th class="text-left py-2 px-2 font-medium">Name</th>
              <th class="text-left py-2 px-2 font-medium">Status</th>
              <th class="text-left py-2 px-2 font-medium">Source</th>
            </tr>
          </thead>
          <tbody>
            ${dates.map(d => {
              const dayLeads = byDate[d];
              return dayLeads.map((l, li) => `
              <tr class="border-b border-dark-700/30">
                ${li === 0 ? `<td class="py-1.5 px-2 text-dark-200 whitespace-nowrap align-top" rowspan="${dayLeads.length}">${fmtDate(d)} <span class="text-dark-500">(${dayLeads.length})</span></td>` : ''}
                <td class="py-1.5 px-2 ${leadStatusColor(l.status)}">${l.name || '—'}</td>
                <td class="py-1.5 px-2 ${leadStatusColor(l.status)}">${l.status || '—'}</td>
                <td class="py-1.5 px-2 text-dark-400">${l.source}</td>
              </tr>`).join('');
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderAccountCPAChart(cycles, goalCPA) {
  const ctx = document.getElementById('chart-acct-cpa');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'CPA', data: cycles.map(c => c.cpa), borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#f97316' },
        ...(goalCPA ? [{ label: 'Goal', data: cycles.map(() => goalCPA), borderColor: 'rgba(148,163,184,0.4)', borderDash: [5,5], pointRadius: 0, fill: false }] : [])
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$'+v }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

function renderAccountLeadsChart(cycles) {
  const ctx = document.getElementById('chart-acct-leads');
  if (!ctx) return;
  const labels = cycles.map(c => c.cycle.replace('Cycle ','C'));
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Total Leads', data: cycles.map(c => c.totalLeads), backgroundColor: 'rgba(59,130,246,0.5)', borderRadius: 4 },
        { label: 'Booked', data: cycles.map(c => c.bookedAppts), backgroundColor: 'rgba(34,197,94,0.5)', borderRadius: 4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: { x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(100,116,139,0.1)' } } }
    }
  });
}

// ═══════════════════════════════════════════════
// RENDER: BILLING TRACKER
// ═══════════════════════════════════════════════
function renderBilling() {
  const el = document.getElementById('view-billing');
  el.classList.remove('hidden');

  const today = getTodayStr();
  const todayMs = new Date(today).getTime();
  const weekMs = 7 * 24 * 60 * 60 * 1000;

  // Gather billing data from ALL cycles (not just active ones)
  const billingData = [];
  allAccounts.forEach(a => {
    const cycles = (a.cycles || []).length ? a.cycles : [];
    // If no cycles, check the account itself
    if (!cycles.length) return;
    cycles.forEach(c => {
      const endMs = c.cycleEndDate ? new Date(c.cycleEndDate).getTime() : null;
      const startMs = c.cycleStartDate ? new Date(c.cycleStartDate).getTime() : null;
      const cycleEnded = endMs ? endMs < todayMs : false;
      const dueSoon = endMs ? (!cycleEnded && (endMs - todayMs) <= weekMs && (endMs - todayMs) >= 0) : false;
      const isActive = startMs && endMs ? (startMs <= todayMs && endMs >= todayMs) : false;
      const gtb = (c.goodToBill || '').trim().toLowerCase();
      const bld = (c.billed || '').trim().toLowerCase();

      billingData.push({
        account: a,
        cycle: c.cycle,
        cycleEndDate: c.cycleEndDate,
        spent: c.amountSpent,
        goodToBill: c.goodToBill || '',
        billed: c.billed || '',
        billingNotes: c.billingNotes || '',
        monthlyBudget: a.monthlyBudget || c.monthlyBudget,
        cycleEnded,
        dueSoon,
        isActive,
        // Billing states
        isBilled: gtb === 'yes' && bld === 'yes',
        isReadyToBill: gtb === 'yes' && bld !== 'yes' && cycleEnded,
        isOverdue: cycleEnded && bld !== 'yes' && (gtb === 'no' || gtb === 'try again' || gtb === ''),
        isDueSoon: dueSoon && bld !== 'yes',
        isRetry: gtb === 'try again',
      });
    });
  });

  // Categorize — priority order (a cycle only appears in one bucket)
  const overdue = billingData.filter(b => b.isOverdue && b.cycleEnded);
  const readyToBill = billingData.filter(b => b.isReadyToBill && !b.isBilled);
  const dueSoon = billingData.filter(b => b.isDueSoon && !b.isBilled && !b.isReadyToBill && !b.isOverdue);
  const billed = billingData.filter(b => b.isBilled);

  const totalOverdue = overdue.reduce((s,b) => s + (b.monthlyBudget || 0), 0);
  const totalReady = readyToBill.reduce((s,b) => s + (b.monthlyBudget || 0), 0);
  const totalDueSoon = dueSoon.reduce((s,b) => s + (b.monthlyBudget || 0), 0);
  const totalBilled = billed.reduce((s,b) => s + (b.monthlyBudget || 0), 0);

  function daysUntil(dateStr) {
    if (!dateStr) return '';
    const diff = Math.ceil((new Date(dateStr).getTime() - todayMs) / (24*60*60*1000));
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    if (diff < 0) return Math.abs(diff) + 'd overdue';
    return diff + 'd away';
  }

  function billingRow(b, statusHtml) {
    return `<tr class="table-row border-b border-dark-700/50 cursor-pointer" onclick="navigate('account',{name:'${esc(b.account.name)}',adAccountId:'${b.account.adAccountId}'})">
      <td class="py-3 px-4 text-white font-medium">${b.account.name}</td>
      <td class="py-3 px-4 text-dark-300">${b.cycle}</td>
      <td class="py-3 px-4 text-dark-300">${b.cycleEndDate || '—'}</td>
      <td class="py-3 px-4 text-right text-white">${fmtDollar(b.monthlyBudget)}</td>
      <td class="py-3 px-4">${statusHtml}</td>
      <td class="py-3 px-4 text-dark-400 text-xs max-w-[200px] truncate">${b.billingNotes}</td>
    </tr>`;
  }

  function sectionTable(items, rowMapper) {
    return `<table class="w-full text-sm">
      <thead><tr class="border-b border-dark-600 text-dark-400 text-xs uppercase">
        <th class="py-2 px-4 text-left">Account</th><th class="py-2 px-4 text-left">Cycle</th>
        <th class="py-2 px-4 text-left">Cycle End</th><th class="py-2 px-4 text-right">Budget</th>
        <th class="py-2 px-4 text-left">Status</th><th class="py-2 px-4 text-left">Notes</th>
      </tr></thead><tbody>${items.map(rowMapper).join('')}</tbody></table>`;
  }

  el.innerHTML = `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">Billing Tracker</h1>
      <p class="text-dark-300 text-sm mt-1">Cycle-based billing status</p>
    </div>
    <div class="grid grid-cols-5 gap-4 mb-6">
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Overdue</div><div class="text-2xl font-bold text-red-400">${overdue.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalOverdue)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Ready to Bill</div><div class="text-2xl font-bold text-yellow-400">${readyToBill.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalReady)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Due Soon</div><div class="text-2xl font-bold text-orange-400">${dueSoon.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalDueSoon)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Billed</div><div class="text-2xl font-bold text-green-400">${billed.length}</div><div class="text-xs text-dark-400">${fmtDollar(totalBilled)}</div></div>
      <div class="glass rounded-xl p-4 kpi-card"><div class="text-dark-400 text-xs uppercase">Total Cycles</div><div class="text-2xl font-bold text-white">${billingData.length}</div></div>
    </div>

    ${overdue.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4 border border-red-500/30">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2 bg-red-500/10">
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
        <h3 class="text-red-400 font-semibold">Overdue — Cycle Ended, Not Billed (${overdue.length})</h3>
      </div>
      ${sectionTable(overdue, b => billingRow(b,
        b.isRetry
          ? '<span class="badge" style="background:rgba(251,146,60,0.15);color:#fb923c;">Try Again</span>'
          : '<span class="badge" style="background:rgba(239,68,68,0.15);color:#f87171;">Not Ready</span>'
      ))}
    </div>` : ''}

    ${dueSoon.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4 border border-orange-500/30">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2 bg-orange-500/10">
        <span class="w-2 h-2 rounded-full bg-orange-500"></span>
        <h3 class="text-orange-400 font-semibold">Billing Due Soon — Within 7 Days (${dueSoon.length})</h3>
      </div>
      ${sectionTable(dueSoon, b => billingRow(b,
        '<span class="text-orange-400 text-xs font-medium">' + daysUntil(b.cycleEndDate) + '</span>'
      ))}
    </div>` : ''}

    ${readyToBill.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
        <h3 class="text-yellow-400 font-semibold">Ready to Bill (${readyToBill.length})</h3>
      </div>
      ${sectionTable(readyToBill, b => billingRow(b,
        '<span class="badge" style="background:rgba(250,204,21,0.15);color:#facc15;">Ready</span>'
      ))}
    </div>` : ''}

    ${billed.length ? `
    <div class="glass rounded-xl overflow-hidden mb-4">
      <div class="p-4 border-b border-dark-600 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-500"></span>
        <h3 class="text-white font-semibold">Billed (${billed.length})</h3>
      </div>
      ${sectionTable(billed, b => billingRow(b,
        '<span class="badge badge-green">Billed</span>'
      ))}
    </div>` : ''}

    ${!overdue.length && !readyToBill.length && !dueSoon.length && !billed.length ? `
    <div class="glass rounded-xl p-8 text-center">
      <p class="text-dark-400">No billing data available for current cycles.</p>
    </div>` : ''}
  `;
}
